spring.application.name=aplicacionweb

# PostgreSQL config
# En local usa estos valores por defecto. En producción (Render/Railway/etc.)
# se sobreescriben poniendo las variables de entorno SPRING_DATASOURCE_URL,
# SPRING_DATASOURCE_USERNAME y SPRING_DATASOURCE_PASSWORD en el panel del servicio.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-0-ca-central-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.icyuxfmdeiglfkvcdhgu}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:%NaR3P-sSrCz*&v}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Puerto: en Render/Railway suele venir dado por la variable PORT
server.port=${PORT:8080}

